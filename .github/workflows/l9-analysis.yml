# ─────────────────────────────────────────────────────────────────────────────
# L9 Analysis — pull-request (pr_fast profile)
#
# Thin wrapper around the shared engine (_l9-analysis.yml). Runs the governed
# Semgrep pipeline on every pull request under the pr_fast governance profile
# (see .github/governance/execution-profiles.yaml). The engine resolves
# governance, runs semgrep, normalizes/validates/routes findings through the
# pinned l9-ci-sdk, and publishes the result as a GitHub check via Core's
# publish-analysis.yml reusable workflow.
#
# Triggers match pr_fast's allowed_events: pull_request + workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────

name: l9-analysis

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: l9-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: L9 analysis (pr_fast)
    permissions:
      contents: read
      actions: read
      checks: write
    uses: ./.github/workflows/_l9-analysis.yml
    with:
      profile: pr_fast
      matrix-id: pr-semgrep
