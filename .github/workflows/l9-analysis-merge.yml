# ─────────────────────────────────────────────────────────────────────────────
# L9 Analysis — merge (merge profile)
#
# Thin wrapper around the shared engine (_l9-analysis.yml). Runs the governed
# Semgrep pipeline on every push to the default branch under the merge
# governance profile (see .github/governance/execution-profiles.yaml).
#
# Triggers match merge's allowed_events: push (main/master) + workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────

name: l9-analysis-merge

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: l9-analysis-merge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: L9 analysis (merge)
    permissions:
      contents: read
      actions: read
      checks: write
    uses: ./.github/workflows/_l9-analysis.yml
    with:
      profile: merge
      matrix-id: merge-semgrep
