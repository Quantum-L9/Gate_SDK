# ─────────────────────────────────────────────────────────────────────────────
# Gate_SDK — Release & PyPI Publish Pipeline

# Triggered on: push to v* tag | workflow_dispatch (manual dry-run)

# Gates (sequential, each blocks publish):
# 1 verify-tag     — semver vX.Y.Z + version matches pyproject.toml
# 2 quality-gate   — lint + typecheck + contracts + schema-drift + tests
# 3 dep-audit      — pip-audit CVE scan on release candidate
# 4 build          — python -m build → sdist + wheel
# 5 sbom           — CycloneDX SBOM generation
# 6 publish        — PyPI Trusted Publisher (OIDC)
# 7 gh-release     — GitHub Release with dist/* + SBOM

# ci.yml is a PR/push gate — it NEVER publishes.
# This file owns the release lifecycle only.
# ─────────────────────────────────────────────────────────────────────────────

name: release-publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run: build + audit but skip PyPI publish"
        type: boolean
        default: true

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.12"

# ─────────────────────────────────────────────────────────────────────────────
# GATE 1 — Tag + version consistency check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  verify-tag:
    name: gate-1-tag-version-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract tag version
        id: extract
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG} → Version: ${VERSION}"

      - name: Verify version matches pyproject.toml
        run: |
          TOML_VERSION=$(python - <<'PY'
          import re, pathlib
          text = pathlib.Path("pyproject.toml").read_text()
          m = re.search(r'^\s*version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          print(m.group(1) if m else "NOT_FOUND")
          PY
          )
          TAG_VERSION="${{ steps.extract.outputs.version }}"
          echo "pyproject.toml version: ${TOML_VERSION}"
          echo "Tag version:            ${TAG_VERSION}"
          if [[ "${TOML_VERSION}" != "${TAG_VERSION}" && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "::error::Version mismatch — pyproject.toml has '${TOML_VERSION}' but tag is '${TAG_VERSION}'"
            exit 1
          fi

# ─────────────────────────────────────────────────────────────────────────────
# GATE 2 — Full quality gate (defence-in-depth re-run on release commit)
# ─────────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: gate-2-quality
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      L9_ENVIRONMENT: "test"
      L9_DEV_MODE: "false"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Ruff format check
        run: ruff format --check src tests scripts

      - name: Mypy strict
        run: mypy src

      - name: Contract validation
        run: python scripts/validate_contracts.py

      - name: Schema drift check
        run: |
          python scripts/generate_schema.py
          git diff --exit-code contracts/transport-packet.schema.json || {
            echo "::error::Schema drift on release commit — commit the regenerated schema first"
            exit 1
          }

      - name: Pytest (full suite)
        run: pytest -q --tb=short

# ─────────────────────────────────────────────────────────────────────────────
# GATE 3 — Dependency CVE audit on release candidate
# ─────────────────────────────────────────────────────────────────────────────
  dep-audit:
    name: gate-3-dep-audit
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package + audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit

      - name: pip-audit (release gate)
        run: pip-audit --strict

# ─────────────────────────────────────────────────────────────────────────────
# GATE 4 — Build release artifacts
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: gate-4-build
    needs: dep-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build toolchain
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify dist contents
        run: |
          ls -lh dist/
          python -m pip install twine
          twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ needs.verify-tag.outputs.version }}
          path: dist/*
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
# GATE 5 — SBOM generation (supply-chain provenance)
# ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: gate-5-sbom
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package + CycloneDX tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install cyclonedx-bom

      - name: Generate SBOM
        run: |
          cyclonedx-py environment \
            --output-format json \
            --outfile sbom-${{ needs.verify-tag.outputs.version }}.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.verify-tag.outputs.version }}
          path: sbom-${{ needs.verify-tag.outputs.version }}.cdx.json
          retention-days: 365

# ─────────────────────────────────────────────────────────────────────────────
# GATE 6 — PyPI Trusted Publisher (OIDC)
# Skipped entirely on dry-run.
# ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: gate-6-pypi-publish
    needs: [build, sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi-release
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist-${{ needs.verify-tag.outputs.version }}
          path: dist/

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          verbose: true

# ─────────────────────────────────────────────────────────────────────────────
# GATE 7 — GitHub Release
# ─────────────────────────────────────────────────────────────────────────────
  gh-release:
    name: gate-7-github-release
    needs: [verify-tag, publish, sbom]
    if: |
      always() &&
      needs.verify-tag.result == 'success' &&
      needs.sbom.result == 'success' &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist-${{ needs.verify-tag.outputs.version }}
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ needs.verify-tag.outputs.version }}
          path: sbom/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.verify-tag.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.verify-tag.outputs.version, 'rc') }}
          files: |
            dist/*
            sbom/*.cdx.json

# ─────────────────────────────────────────────────────────────────────────────
# ALL RELEASE GATES PASSED — aggregator
# ─────────────────────────────────────────────────────────────────────────────
  all-release-gates-passed:
    name: "all-release-gates-passed ✅"
    needs: [verify-tag, quality-gate, dep-audit, build, sbom, publish, gh-release]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate release gates
        run: |
          FAILED=""
          [[ "${{ needs.verify-tag.result }}" != "success" ]] && FAILED="$FAILED verify-tag"
          [[ "${{ needs.quality-gate.result }}" != "success" ]] && FAILED="$FAILED quality-gate"
          [[ "${{ needs.dep-audit.result }}" != "success" ]] && FAILED="$FAILED dep-audit"
          [[ "${{ needs.build.result }}" != "success" ]] && FAILED="$FAILED build"
          [[ "${{ needs.sbom.result }}" != "success" ]] && FAILED="$FAILED sbom"
          SKIP_PUBLISH="${{ needs.publish.result == 'skipped' }}"
          if [[ "$SKIP_PUBLISH" != "true" && "${{ needs.publish.result }}" != "success" ]]; then
            FAILED="$FAILED publish"
          fi
          [[ "${{ needs.gh-release.result }}" != "success" ]] && FAILED="$FAILED gh-release"
          if [[ -n "$FAILED" ]]; then
            echo "::error::RELEASE BLOCKED — failed gates:$FAILED"
            exit 1
          fi
          echo "All release gates passed ✅"
