name: coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: pytest-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade packaging toolchain
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package with dev dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest -q \
            --cov=constellation_node_sdk \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

# NOTE: This job declares needs: [quality] which references the quality job
# defined in ci.yml. Both workflows run in the same CI context on the same
# trigger. If the quality job is renamed in ci.yml, update needs: here.
# Enforcement: job fails if pytest --cov-fail-under=80 exits non-zero.
# Merge gate: coverage job must pass before build-artifacts may proceed.
# To add as a required status check, enable branch protection on main/master
# and add "coverage / pytest-coverage (3.12)" to required checks.
