name: coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: pytest-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade packaging toolchain
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package with dev dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest -q \
            --cov=constellation_node_sdk \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

# NOTE: This job previously declared `needs: [quality]`, intending to depend
# on the "quality" job defined in ci.yml. GitHub Actions' `needs:` can only
# reference jobs within the SAME workflow file — cross-workflow dependencies
# are not supported this way (a job named "quality" doesn't even exist in
# ci.yml). That reference was dangling and caused this workflow to fail with
# a startup_failure before any job ever ran. Removed; this job now runs
# independently in parallel with ci.yml on the same push/pull_request
# trigger, matching integration.yml's pattern.
# Enforcement: job fails if pytest --cov-fail-under=80 exits non-zero.
# To add as a required status check, enable branch protection on main/master
# and add "coverage / pytest-coverage (3.12)" to required checks.
