repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - pydantic>=2.0
          - fastapi>=0.111.0
          - starlette>=0.37.2
          - httpx>=0.27.0
          - prometheus-client>=0.20.0
          - python-json-logger>=2.0.7
          - cryptography>=42.0.0
          - PyYAML>=6.0
          - types-PyYAML
          - types-requests

  - repo: local
    hooks:
      - id: validate-contracts
        name: validate-contracts
        language: python
        entry: python scripts/validate_contracts.py
        pass_filenames: false
        always_run: true

      - id: generate-schema-check
        name: generate-schema-check
        language: python
        entry: bash -c 'python scripts/generate_schema.py && git diff --exit-code contracts/transport-packet.schema.json'
        pass_filenames: false
        always_run: true
