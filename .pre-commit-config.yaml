repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.8.0
          - fastapi>=0.115.0
          - httpx>=0.27.0
          - cryptography>=42.0.0
          - pyyaml>=6.0.2
        files: ^src/

  - repo: local
    hooks:
      - id: validate-contracts
        name: validate-contracts
        entry: python scripts/validate_contracts.py
        language: system
        pass_filenames: false

      - id: generate-schema-check
        name: generate-schema-check
        entry: bash -c 'python scripts/generate_schema.py && git diff --exit-code contracts/transport-packet.schema.json'
        language: system
        pass_filenames: false
